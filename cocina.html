<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👨‍🍳TacosPOSPro - Cocina</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><path d='M8,20 Q32,6 56,20 C58,28 54,44 32,50 C10,44 6,28 8,20 Z' fill='%23FBC02D' stroke='%23E65100' stroke-width='2'/><path d='M14,24 Q32,14 50,24 C45,34 20,34 14,24 Z' fill='%234E342E'/><path d='M10,21 Q16,16 22,24 Q28,16 34,24 Q40,16 46,24 Q52,16 54,20 C50,24 14,24 10,21 Z' fill='%2381C784'/><circle cx='20' cy='22' r='3' fill='%23E53935'/><circle cx='32' cy='20' r='3' fill='%23E53935'/><circle cx='44' cy='22' r='3' fill='%23E53935'/></svg>">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root{--dark:#0D0E12;--card:#15161E;--primary:#E65100;--warning:#FBC02D;--info:#0288D1;--success:#2E7D32;--danger:#C62828;--text:#E1E1E6;--muted:#8F909A;--border:#22232B}
        *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
        body{background:var(--dark);color:var(--text);padding:24px;height:100vh;display:flex;flex-direction:column;overflow:hidden}
        h2{font-size:1.9rem;margin-bottom:18px;color:var(--primary);display:flex;justify-content:space-between;align-items:center;border-bottom:2px solid var(--border);padding-bottom:10px}
        .status{font-size:.9rem;padding:6px 12px;border-radius:20px;font-weight:bold;background:#1B5E20;color:#E8F5E9}
        .grid{flex:1;display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:20px;overflow-y:auto;padding-bottom:30px}
        .card{background:var(--card);border-radius:16px;border:2px solid var(--border);display:flex;flex-direction:column;overflow:hidden;box-shadow:0 8px 24px rgba(0,0,0,.2);transition:transform .2s}
        .card.pendiente_cocina{border-top:6px solid var(--info)}
        .card.preparando{border-top:6px solid var(--warning);animation:pulse 2s infinite}
        @keyframes pulse{0%,100%{border-top-color:var(--warning)}50%{border-top-color:#FFF59D}}
        .header{padding:14px 16px;background:rgba(255,255,255,.02);border-bottom:1px solid var(--border)}
        .dest{font-size:1.15rem;font-weight:800;color:var(--text);text-transform:uppercase;display:flex;align-items:center;gap:6px; line-height: 1.3;}
        .meta{display:flex;justify-content:space-between;font-size:.8rem;color:var(--muted);margin-top:6px;font-weight:600}
        .body{flex:1;padding:16px;overflow-y:auto;display:flex;flex-direction:column;gap:14px}
        .plato{background:rgba(255,255,255,.03);border-radius:10px;border:1px solid #2C2D35;padding:10px;border-left:4px solid var(--primary)}
        .plato-title{font-size:.8rem;font-weight:800;color:var(--primary);text-transform:uppercase;margin-bottom:8px;letter-spacing:.5px}
        .prod-row{display:flex;align-items:flex-start;gap:12px;padding:6px 0;border-bottom:1px dashed rgba(255,255,255,.06)}
        .prod-row:last-child{border-bottom:none}
        .qty-badge{font-size:1.6rem;font-weight:900;color:#FF6F00;min-width:45px;text-align:left;line-height:1.1}
        .details{flex:1}
        .item-name{font-size:1.1rem;font-weight:700;color:var(--text)}
        .prep-spec{display:inline-block;font-size:.85rem;font-weight:800;color:#1A1A1E;background:#FFE082;padding:2px 8px;border-radius:4px;margin-top:4px}
        .footer{padding:14px;background:rgba(0,0,0,.2);border-top:1px solid var(--border)}
        .btn{width:100%;border:none;padding:14px;border-radius:10px;font-size:1.05rem;font-weight:800;cursor:pointer;color:var(--text);transition:opacity .2s;text-align:center}
        .btn:hover{opacity:.9}
        .btn-start{background:var(--info)}
        .btn-done{background:var(--success)}
        .empty{text-align:center;color:var(--muted);font-size:1.2rem;margin-top:100px;grid-column:1/-1;font-weight:600}
        
        /* Estilos Ventana Modal */
        .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.7);z-index:100;align-items:center;justify-content:center}
        .modal.active{display:flex}
        .modal-content{background:var(--card);border-radius:16px;border:2px solid var(--border);padding:24px;max-width:750px;width:95%;max-height:85vh;overflow-y:auto;box-shadow:0 10px 40px rgba(0,0,0,.5)}
        .modal-title{font-size:1.4rem;font-weight:900;color:var(--primary);margin-bottom:16px}
        .edit-item-row{display:flex;justify-content:space-between;align-items:center;background:rgba(255,255,255,.05);padding:10px 14px;border-radius:8px;border:1px solid rgba(255,255,255,.1);margin-bottom:8px}
        .edit-btn-qty{background:rgba(255,255,255,.1);border:none;width:32px;height:32px;border-radius:6px;color:var(--text);cursor:pointer;font-weight:bold;font-size:1.1rem;display:flex;align-items:center;justify-content:center}
        .edit-btn-qty:hover{background:rgba(255,255,255,.2)}
        .prod-add-card{background:rgba(230,81,0,.08);border:1px solid var(--primary);border-radius:8px;padding:10px 12px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;color:var(--text);font-weight:600;margin-bottom:6px;transition:background .15s}
        .prod-add-card:hover{background:rgba(230,81,0,.2)}
    </style>
</head>
<body>
    <h2>
        <span>👨‍🍳TacosPOSPro - Monitor de Cocina</span>
        <span class="status">● Activo</span>
    </h2>
    <div class="grid" id="grid">
        <div class="empty">Esperando órdenes...</div>
    </div>
    
    <div class="modal" id="editModal">
        <div class="modal-content">
            <div class="modal-title">✏️ Modificar / Agregar Productos al Pedido</div>
            <div style="display:flex; gap:20px; flex-wrap:wrap;">
                <div style="flex:1; min-width:300px; display:flex; flex-direction:column; max-height: 320px; overflow-y: auto; padding-right:6px;">
                    <h3 style="color:var(--muted); margin-bottom: 8px;">📋 Productos en la orden actual</h3>
                    <div id="editOrderItems"></div>
                </div>
                <div style="flex:1; min-width:250px; border-left: 1px solid var(--border); padding-left: 20px; display:flex; flex-direction:column;">
                    <h3 style="color:var(--warning); margin-bottom: 8px;">➕ Agregar más al pedido</h3>
                    <div style="max-height: 320px; overflow-y: auto; flex:1;" id="editProdList"></div>
                </div>
            </div>
            <div style="display:flex; gap:12px; margin-top:24px;">
                <button class="btn btn-done" style="flex:1; padding:14px; font-size:1.1rem;" onclick="guardarEdicionOrden()">💾 Guardar Cambios</button>
                <button class="btn" style="background:var(--border); width: 130px; color:var(--text);" onclick="cerrarEdicion()">Cerrar</button>
            </div>
        </div>
    </div>
    
    <script>
    const SUPA_URL='https://wzqeyhrxbnfntnmvkjub.supabase.co';
    const SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind6cWV5aHJ4Ym5mbnRubXZranViIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1Nzk1MTMsImV4cCI6MjA5NTE1NTUxM30.x9l2KQHcP0wWqAvWbLd6tDUjZNCCmG6z6up5iAg551w';
    let db = null, orders = [], productos = [];
    let currentOrder = null, editingItems = [];
    
    async function init(){
        db = window.supabase.createClient(SUPA_URL, SUPA_KEY);
        await cargarProductos();
        await cargar();
        db.channel('cocina').on('postgres_changes', {event:'*', schema:'public', table:'pedidos'}, () => cargar()).subscribe();
    }
    
    async function cargarProductos(){
        try {
            const {data} = await db.from('productos').select('*').order('nombre');
            productos = data || [];
        } catch(e) { console.error("Error al cargar menú en cocina:", e); }
    }
    
    async function cargar(){
        try {
            const {data} = await db.from('pedidos').select('*').in('estado',['pendiente_cocina','preparando']).order('created_at', {ascending:true});
            orders = data || [];
            render();
        } catch(e) { console.error(e); }
    }
    
    function render(){
        const g = document.getElementById('grid');
        if(!orders.length){
            g.innerHTML = '<div class="empty">🔥 ¡Cocina limpia! Sin órdenes.</div>';
            return;
        }
        
        g.innerHTML = orders.map(o => {
            let h = '';
            const ps = {};
            
            (o.productos || []).forEach(i => {
                if(!ps[i.persona]) ps[i.persona] = {};
                const k = `${i.nombre}-${i.preparacion}`;
                if(!ps[i.persona][k]) ps[i.persona][k] = {nombre: i.nombre, prep: i.preparacion, qty: 0};
                ps[i.persona][k].qty += i.cantidad;
            });
            
            for(let p in ps){
                h += `<div class="plato"><div class="plato-title">🍽️ Plato ${p}</div>`;
                for(let ck in ps[p]){
                    const item = ps[p][ck];
                    h += `<div class="prod-row">
                            <div class="qty-badge">x${item.qty}</div>
                            <div class="details">
                                <div class="item-name">${item.nombre}</div>
                                ${item.prep ? `<div class="prep-spec">${item.prep.replace('_', ' ')}</div>` : ''}
                            </div>
                          </div>`;
                }
                h += '</div>';
            }
            
            const btn = o.estado === 'pendiente_cocina' 
                ? `<button class="btn btn-start" onclick="cambiar('${o.id}','preparando')">👨‍🍳 Iniciar</button>`
                : `<button class="btn btn-done" onclick="cambiar('${o.id}','listo')">✅ Listo</button>`;
                
            const clienteStr = o.cliente ? `<br><span style="color:var(--warning); font-size:1rem;">👤 ${o.cliente}</span>` : '';
            
            return `<div class="card ${o.estado}">
                <div class="header">
                    <div class="dest">📍 ${o.tipo_servicio.toUpperCase()} - ${o.identificador_servicio} ${clienteStr}</div>
                    <div class="meta">
                        <span>ID: ${o.id.substring(0,8)}</span>
                        <span>${new Date(o.created_at).toLocaleTimeString('es',{hour:'2-digit',minute:'2-digit'})}</span>
                    </div>
                </div>
                <div class="body">${h}</div>
                <div class="footer" style="display:flex; gap:8px;">
                    <div style="flex:1;">${btn}</div>
                    <button class="btn" style="background:#444; width:100px;" onclick="abrirEdicion('${o.id}')">✏️ Editar</button>
                </div>
            </div>`;
        }).join('');
    }
    
    async function cambiar(id, est){
        try {
            await db.from('pedidos').update({estado: est}).eq('id', id);
            await cargar();
        } catch(e) { alert('Error: '+e.message); }
    }
    
    /* ---------------- LÓGICA DE VENTANA MODAL EDICIÓN ---------------- */
    function abrirEdicion(id) {
        currentOrder = orders.find(o => o.id === id);
        if(!currentOrder) return;
        
        // Clonamos la lista de productos para no mutar el array original
        editingItems = JSON.parse(JSON.stringify(currentOrder.productos || []));
        
        renderModalEdicion();
        document.getElementById('editModal').classList.add('active');
    }

    function cerrarEdicion() {
        document.getElementById('editModal').classList.remove('active');
        currentOrder = null;
        editingItems = [];
    }

    function renderModalEdicion() {
        const listaItems = document.getElementById('editOrderItems');
        
        if(editingItems.length === 0) {
            listaItems.innerHTML = '<div style="text-align:center; color:var(--muted); padding: 20px;">No hay productos agregados.</div>';
        } else {
            listaItems.innerHTML = editingItems.map((item, idx) => {
                const prep = item.preparacion ? ` (Preparación: ${item.preparacion.replace('_', ' ')})` : '';
                return `
                <div class="edit-item-row">
                    <div>
                        <strong>${item.nombre}</strong><br>
                        <span style="font-size: 0.85rem; color: var(--muted);">${item.cantidad} x $${item.precio_unitario.toFixed(2)}</span>
                        <span style="font-size:0.75rem; color:var(--primary); font-weight:800; display:block;">${prep}</span>
                    </div>
                    <div style="display:flex; align-items:center; gap:6px;">
                        <button class="edit-btn-qty" onclick="modCantidad(${idx}, -1)">-</button>
                        <span style="font-weight:900; width:25px; text-align:center;">${item.cantidad}</span>
                        <button class="edit-btn-qty" onclick="modCantidad(${idx}, 1)">+</button>
                        <button class="edit-btn-qty" style="background:var(--danger);" onclick="eliminarItemEdit(${idx})">🗑️</button>
                    </div>
                </div>
                `;
            }).join('');
        }

        // Carga el menú desde la base de datos para poder añadir más
        const listaProd = document.getElementById('editProdList');
        listaProd.innerHTML = productos.map(p => {
            return `<div class="prod-add-card" onclick="agregarProdEdit(${p.id}, '${p.nombre.replace(/'/g, "\\'")}', ${p.precio})">
                <span>${p.nombre}</span>
                <strong style="color:var(--primary)">$${p.precio.toFixed(2)}</strong>
            </div>`;
        }).join('');
    }

    function modCantidad(idx, val) {
        editingItems[idx].cantidad += val;
        // Evita cantidades menores a 1, si llega a 0 se puede quitar dando clic al basurero
        if(editingItems[idx].cantidad < 1) {
            editingItems[idx].cantidad = 1;
        }
        renderModalEdicion();
    }

    function eliminarItemEdit(idx) {
        if(confirm('¿Seguro que deseas eliminar este producto de la orden?')) {
            editingItems.splice(idx, 1);
            renderModalEdicion();
        }
    }

    function agregarProdEdit(id, nombre, precio) {
        // Se añade por defecto al plato 1 con la preparación "con_todo" por simplicidad
        editingItems.push({
            producto_id: id,
            nombre: nombre,
            cantidad: 1,
            precio_unitario: precio,
            preparacion: 'con_todo',
            persona: 1
        });
        renderModalEdicion();
    }

    async function guardarEdicionOrden() {
        if(!currentOrder) return;
        try {
            // Recalcula el total de la orden sumando los subtotales de la lista editada
            const nuevoTotal = editingItems.reduce((sum, item) => sum + (item.cantidad * item.precio_unitario), 0);
            
            await db.from('pedidos').update({
                productos: editingItems,
                total: nuevoTotal
            }).eq('id', currentOrder.id);
            
            alert('✅ ¡Orden actualizada correctamente en cocina y caja!');
            cerrarEdicion();
            await cargar();
        } catch(e) {
            alert('Error al actualizar el pedido: ' + e.message);
        }
    }
    
    window.addEventListener('load', init);
    </script>
</body>
</html>
